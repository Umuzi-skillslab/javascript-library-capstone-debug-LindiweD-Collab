<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechBridge Library Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-flourish" aria-hidden="true">
      <svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 20 C 40 2, 70 2, 100 20 C 130 38, 160 38, 198 20" />
        <circle cx="100" cy="20" r="3.5" />
      </svg>
    </div>
    <p class="header-eyebrow">est. for booklovers</p>
    <h1><span class="script-word">The</span> TechBridge Library</h1>
    <p class="header-sub">Search, borrow, and manage the collection ♡</p>
  </header>

  <div class="scallop-divider" aria-hidden="true"></div>

  <main class="app-main">

    <!-- ── STATS ── -->
    <section id="stats-panel" class="stats-panel" aria-label="Library statistics">
      <!-- Populated by updateStatsDisplay() -->
    </section>

    <!-- ── SEARCH & FILTER ── -->
    <section class="controls">
      <input type="text" id="search-input" placeholder="Search books by title..." aria-label="Search books" />
      <select id="filter-category" aria-label="Filter by category">
        <option value="all">All Categories</option>
        <option value="Fiction">Fiction</option>
        <option value="Non-Fiction">Non-Fiction</option>
        <option value="Science">Science</option>
        <option value="Technology">Technology</option>
        <option value="History">History</option>
      </select>
      <label class="active-member-label">
        Active Member ID:
        <input type="text" id="active-member-id" placeholder="e.g. M001" />
      </label>
    </section>

    <!-- ── CATALOGUE ── -->
    <section class="catalogue-section">
      <h2>Book Catalogue</h2>
      <div id="book-catalogue" class="book-catalogue" aria-live="polite">
        <!-- Populated by renderBookCatalogue() -->
      </div>
    </section>

    <!-- ── ADD BOOK ── -->
    <section class="form-section">
      <h2>Add a Book</h2>
      <form id="add-book-form">
        <input type="text" id="book-isbn" placeholder="ISBN" required />
        <input type="text" id="book-title" placeholder="Title" required />
        <input type="text" id="book-author" placeholder="Author" required />
        <select id="book-category" required>
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Science">Science</option>
          <option value="Technology">Technology</option>
          <option value="History">History</option>
        </select>
        <input type="number" id="book-copies" placeholder="Copies" min="1" value="1" required />
        <button type="submit">Add Book</button>
      </form>
    </section>

    <!-- ── MEMBERS ── -->
    <section class="form-section">
      <h2>Members</h2>
      <form id="add-member-form">
        <input type="text" id="member-id" placeholder="Member ID" required />
        <input type="text" id="member-name" placeholder="Full Name" required />
        <input type="email" id="member-email" placeholder="Email" required />
        <label><input type="checkbox" id="member-premium" /> Premium Member</label>
        <button type="submit">Add Member</button>
      </form>
      <div id="member-list" class="member-list" aria-live="polite">
        <!-- Populated by renderMemberList() -->
      </div>
    </section>

    <!-- ── DATA TOOLS ── -->
    <section class="data-tools">
      <h2>Data</h2>
      <button id="save-btn">💾 Save to Browser</button>
      <button id="load-btn">📂 Load Saved Data</button>
      <button id="export-btn">⬇️ Export as JSON</button>
    </section>

  </main>

  <script type="module" src="src/ui.js"></script>
</body>
</html>
